  macos:
    runs-on: macos-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - name: aria2
          - name: bzip2
          - name: connect
          - name: coreutils
          - name: gettext
          - name: gnupatch
          - name: inetutils
          - name: lsof
          - name: m4
          - name: ncdu_1
          - name: netcat
          - name: rsync
          - name: silver-searcher
          - name: unzip
          - name: vim
          - name: xz
          - name: zip
          - name: zsh
          - name: zstd
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3"
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-24.11
      - run: sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b ~/.local/bin

      - run: ~/.local/bin/task setup
      - run: ~/.local/bin/task ${{ matrix.name }}
      - run: ./pack.py
      - run: tar -czvf ${{ matrix.name }}.darwin_arm64.tar.gz --strip-components=2 /tmp/output
      - uses: svenstaro/upload-release-action@v2
        with:
          file: ${{ matrix.name }}.darwin_arm64.tar.gz
          asset_name: ${{ matrix.name }}.darwin_arm64.tar.gz
          tag: "v1.0"
          overwrite: true
