name: build

on:
  push:
    paths:
      - ".github/workflows/build.yaml"
      - "pkgs/**"
      - "pack.py"
      - "Taskfile.yaml"
  workflow_dispatch:
  # schedule:
  #   - cron: '0 0 - name: - name: 0'

jobs:
  macos:
    runs-on: macos-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - name: aria2
          - name: bzip2
          - name: connect
          - name: coreutils
          - name: fzf
          - name: gettext
          - name: git-lfs
          - name: gnupatch
          - name: go-task
          - name: gost
          - name: inetutils
          - name: lsof
          - name: m4
          - name: ncdu_1
          - name: netcat
          - name: rsync
          - name: shfmt
          - name: silver-searcher
          - name: unzip
          - name: vim
          - name: xz
          - name: zip
          - name: zsh
          - name: zstd
          - name: zsh-bundle
          - name: vim-bundle
          - name: rime-bundle
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3"
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-24.11
      - run: sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b ~/.local/bin

      - run: ~/.local/bin/task setup
      - run: ~/.local/bin/task ${{ matrix.name }}
      - run: ./pack.py
      - run: tar -czvf ${{ matrix.name }}.darwin_arm64.tar.gz --strip-components=2 /tmp/output
      - uses: svenstaro/upload-release-action@v2
        with:
          file: ${{ matrix.name }}.darwin_arm64.tar.gz
          asset_name: ${{ matrix.name }}.darwin_arm64.tar.gz
          tag: "v1.0"
          overwrite: true

      - uses: mxschmitt/action-tmate@v3
        if: ${{ failure() }}
        timeout-minutes: 30

  linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        # task --list-all | sed -e 's/://g' -e 's/*/- name:/g'
        include:
          - name: aria2
          - name: atuin
          - name: autoconf
          - name: automake
          - name: bash
          - name: bat
          - name: bazelisk_patched
          - name: binutils
          - name: bison
          - name: bzip2
          - name: connect
          - name: coreutils
          - name: croc_patched
          - name: curl
          - name: diffutils_patched
          - name: ethtool
          - name: eza
          - name: fd
          - name: file
          - name: findutils
          - name: flex
          # - name: fzf
          - name: fzf_patched
          - name: gdb
          - name: gdu_patched
          - name: gettext
          - name: gh_patched
          - name: git
          - name: git-absorb
          - name: git-extras
          # - name: git-lfs
          - name: git_lfs_patched
          - name: glibcLocales
          - name: gnugrep
          - name: gnumake
          - name: gnupatch
          - name: gnupg_minimal_patched
          - name: gnused
          - name: gnutar
          # - name: go-task
          - name: go_task_patched
          # - name: gost
          - name: gost_patched
          - name: gzip
          - name: inetutils
          - name: iproute2
          - name: iptables
          - name: iputils
          - name: jq
          - name: krb5
          - name: less
          - name: libcap
          - name: libtool
          - name: llvmPackages_18.clang-unwrapped
          - name: lsb-release
          - name: lsof
          - name: m4
          - name: man
          - name: miniserve
          - name: ncdu_1
          - name: netcat
          - name: nettools
          - name: ninja
          - name: nixfmt-rfc-style
          - name: nixpkgs-fmt
          - name: numactl
          - name: openssh_gssapi
          - name: openssl
          - name: patchelf
          - name: perl
          - name: pkg-config
          - name: procps
          - name: procs
          - name: protobuf_24
          - name: protobuf_25
          - name: protobuf_28
          - name: protobuf_3_8_0_patched
          - name: protobuf_3_9_2_patched
          - name: python311_patched
          - name: rsync
          - name: ruff
          # - name: setup
          # - name: setup-extra
          # - name: shfmt
          - name: shfmt_patched
          # - name: silver-searcher
          - name: silver_searcher_patched
          - name: snappy
          - name: starship
          - name: strace
          - name: tmux
          - name: tree
          - name: tzdata
          - name: unzip
          - name: util-linux
          - name: vim
          - name: wget
          - name: xxd
          - name: xz
          - name: zip
          - name: zlib
          - name: zlib-ng
          # - name: zsh
          - name: zsh_patched
          - name: zstd
          - name: zsh-bundle
          - name: vim-bundle
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3"
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-24.11

      - run: sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b ~/.local/bin

      - run: ~/.local/bin/task setup
      - run: ~/.local/bin/task ${{ matrix.name }}
      - run: ./pack.py
      - run: tar -czvf ${{ matrix.name }}.linux_amd64.tar.gz --strip-components=2 /tmp/output

      - uses: svenstaro/upload-release-action@v2
        with:
          file: ${{ matrix.name }}.linux_amd64.tar.gz
          asset_name: ${{ matrix.name }}.linux_amd64.tar.gz
          tag: "v1.0"
          overwrite: true

      - uses: mxschmitt/action-tmate@v3
        if: ${{ failure() }}
        timeout-minutes: 30
